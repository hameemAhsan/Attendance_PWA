<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Attendance Ledger PWA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Local-first</p>
        <h1>Attendance Ledger</h1>
      </div>
      <div class="top-actions">
        <button id="installBtn" class="ghost small" hidden>Install</button>
        <button id="logoutBtn" class="ghost small" hidden>Logout</button>
      </div>
    </header>

    <main id="main" class="main"></main>

    <nav id="bottomNav" class="bottom-nav" hidden>
      <button data-route="dashboard">Dashboard</button>
      <button data-route="setup">Setup</button>
      <button data-route="import">Import</button>
      <button data-route="take">Take</button>
      <button data-route="sheet">Sheet</button>
      <button data-route="export">Export</button>
      <button data-route="settings">Settings</button>
    </nav>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
